<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core Management</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <main class="login-wrapper">
        <section id="login-section">
            <header class="brand-header">
                <h1>HR Core</h1>
                <p>Human Resources Management</p>
            </header>
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" id="submit-btn" class="btn-signin">Sign In →</button>
            </form>
        </section>

        <section id="employee-gallery" class="hidden">
            <header class="dashboard-header">
                <h2>Employees</h2>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </header>
            <div id="employee-grid">
                <table class="employee-table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Job Title</th>
                            <th>Department</th>
                            <th>Address</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employee-list"></tbody>
                </table>
                <div id="error-message" class="error-banner hidden">
                    Failed to load data.
                </div>
            </div>
        </section>
    </main>

    <footer class="utility-footer">
        <p>Privacy Policy | Terms of Service | Security</p>
    </footer>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Core | Admin Login</title>
    <!-- Importing styles from CSS folder to follow modular approach -->
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <main class="login-wrapper">
        <div class="login-container">
            <!-- Brand Identity Area -->
            <header class="brand-header">
                <div class="logo-placeholder"></div>
                <h1>HR Core</h1>
                <p>human Resources Management</p>
            </header>

            <!-- Authentication Form -->
            <form id="login-form" novalidate>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@company.com" required>
                </div>

                <div class="form-group">
                    <div class="password-utility">
                        <label for="password">Password</label>
                        <a href="#" id="forgot-password">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <label class="checkbox-container">
                    <input type="checkbox" id="remember-me"> Remember for 30 days
                </label>

                <button type="submit" id="submit-btn">Sign In →</button>
            </form>

            <!-- SSO Authentication Options -->
            <section class="social-login">
                <p>Or continue with</p>
                <div class="sso-actions">
                    <button type="button" class="btn-sso">Google</button>
                    <button type="button" class="btn-sso">SSO</button>
                </div>
            </section>

            <!-- Utility Footer Links -->
            <footer class="utility-footer">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Security</a>
            </footer>
        </div>
    </main>

    <!-- Loading modular authentication script -->
    <script type="module" src="scripts/auth.js"></script>
</body>
</html>
